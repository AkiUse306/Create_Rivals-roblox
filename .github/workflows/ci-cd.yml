name: CI/CD - Build & Test All Components

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    name: Build C# Backend (Matchmaker)
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup .NET 9.0
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '9.0.x'
    
    - name: Restore
      run: dotnet restore backend/Matchmaker.csproj
    
    - name: Build
      run: dotnet build backend/Matchmaker.csproj -c Release --no-restore
    
    - name: Upload build artifact
      uses: actions/upload-artifact@v3
      with:
        name: backend-dll
        path: backend/bin/Release/net9.0/Matchmaker.dll

  build-dashboard:
    runs-on: ubuntu-latest
    name: Build C# Dashboard
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup .NET 9.0
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '9.0.x'
    
    - name: Restore
      run: dotnet restore local/LocalDashboard.csproj
    
    - name: Build
      run: dotnet build local/LocalDashboard.csproj -c Release --no-restore
    
    - name: Upload build artifact
      uses: actions/upload-artifact@v3
      with:
        name: dashboard-dll
        path: local/bin/Release/net9.0/LocalDashboard.dll

  build-cpp:
    runs-on: ubuntu-latest
    name: Build C++ CLI
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential libcurl4-openssl-dev
    
    - name: Build
      run: |
        cd local
        mkdir -p build
        cd build
        cmake ..
        make
    
    - name: Upload build artifact
      uses: actions/upload-artifact@v3
      with:
        name: cpp-executable
        path: local/build/rivals-client

  code-quality:
    runs-on: ubuntu-latest
    name: Code Quality Checks
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '9.0.x'
    
    - name: Install StyleCop analyzer
      run: |
        cd backend
        dotnet add package StyleCop.Analyzers
        cd ..
    
    - name: Check C# code
      run: dotnet build backend/Matchmaker.csproj -c Release --no-restore /p:EnforceCodeStyleInBuild=true || true
    
    - name: Check files exist
      run: |
        echo "Backend files:"
        ls -lh backend/bin/Release/net9.0/Matchmaker.dll || echo "❌ Backend DLL missing"
        
        echo "Dashboard files:"
        ls -lh local/bin/Release/net9.0/LocalDashboard.dll || echo "❌ Dashboard DLL missing"
        
        echo "C++ executable:"
        ls -lh local/build/rivals-client || echo "❌ C++ executable missing"
        
        echo "Documentation:"
        ls -1 local/*.md

  build-success:
    runs-on: ubuntu-latest
    needs: [build-backend, build-dashboard, build-cpp, code-quality]
    name: Build Status Check
    
    steps:
    - name: All builds passed ✅
      run: echo "✅ All components built successfully!"
